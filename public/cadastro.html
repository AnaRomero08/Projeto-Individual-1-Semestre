<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Cat's | Cadastro</title>
    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="body-auth">

    <div class="alinhamento-auth">
        <div class="card-auth">
            <div class="logo-auth">
                <img src="./assets/imgs/logo_sem_fundo.png" alt="Logo">
            </div>
            <div id="etapa_usuario">
                <h2>Cadastre você e seu gatinho!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>Nome Completo:</span>
                        <input id="nome_input" type="text" placeholder="Nome Completo">
                    </div>
                    <div class="campo">
                        <span>Email:</span>
                        <input id="email_input" type="text" placeholder="email@email.com">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="**********">
                    </div>
                    <div class="campo">
                        <span>Telefone:</span>
                        <input id="tel_input" type="text" placeholder="(**) *****-****">
                    </div>

                    <div class="pergunta-pet">
                        <p>Já possui um felino?</p>
                        <div class="opcoes-radio">
                            <label>
                                <input type="radio" name="temPet" value="sim" onclick="mudarBotao('proximo')"> Sim
                            </label>
                            <label>
                                <input type="radio" name="temPet" value="nao" onclick="mudarBotao('cadastrar')" checked>
                                Não
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div id="etapa_pet" style="display: none;">
                <h2>Insira as informações sobre seu felino!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>Nome:</span>
                        <input id="nome_pet_input" type="text" placeholder="ex: Mingau">
                    </div>
                    <div class="linha-dupla">
                        <div class="campo">
                            <span>Idade:</span>
                            <input id="idade_pet_input" type="number">
                        </div>
                        <div class="campo">
                            <span>Peso (kg):</span>
                            <input id="peso_pet_input" type="number">
                        </div>
                    </div>
                    <div class="campo">
                        <span>Dias de companheirismo:</span>
                        <input id="tempo_pet_input" type="number">
                    </div>

                    <div class="container-img-pet">
                    </div>
                </div>
            </div>

            <div class="acoes-auth">
                <div class="botoes-fluxo">
                    <button id="btn_voltar" class="btn-voltar" onclick="voltarEtapa()"
                        style="display: none;">Voltar</button>
                    <button id="btn_acao" class="btn-enviar" onclick="proximaEtapa()">Cadastrar</button>
                </div>
                <p id="link_login">Já tem uma conta? <a href="login.html">Entre</a></p>
            </div>
            <script>
                // Função para mudar o texto do botão conforme a seleção do rádio
                function mudarBotao(tipo) {
                    const btn = document.getElementById('btn_acao');
                    if (tipo === 'proximo') {
                        btn.innerHTML = "Próximo ->";
                    } else {
                        btn.innerHTML = "Cadastrar";
                    }
                }

                function proximaEtapa() {
                    const temPet = document.querySelector('input[name="temPet"]:checked').value;
                    const etapaUser = document.getElementById('etapa_usuario');
                    const etapaPet = document.getElementById('etapa_pet');
                    const btnAcao = document.getElementById('btn_acao');
                    const btnVoltar = document.getElementById('btn_voltar');
                    const linkLogin = document.getElementById('link_login');

                    // Se marcou que tem pet e ainda está na primeira etapa
                    if (temPet === 'sim' && etapaPet.style.display === 'none') {
                        // Validação básica da primeira etapa antes de prosseguir
                        if (validarPrimeiraEtapa()) {
                            etapaUser.style.display = 'none';
                            etapaPet.style.display = 'block';
                            btnAcao.innerHTML = "Finalizar Cadastro";
                            btnVoltar.style.display = "block";
                            linkLogin.style.display = 'none';
                        }
                    } else {
                        // Se não tem pet OU se já está na etapa do pet, chama o cadastro final
                        cadastrar();
                    }
                }

                function validarPrimeiraEtapa() {
                    var email = email_input.value;
                    var senha = senha_input.value;
                    if (email == "" || senha == "") {
                        alert("Por favor, preencha email e senha para continuar.");
                        return false;
                    }
                    return true;
                }

                function cadastrar() {
                    // Recuperando os valores do formulário
                    var nomeVar = nome_input.value;
                    var emailVar = email_input.value;
                    var senhaVar = senha_input.value;
                    var telefoneVar = tel_input.value;
                    var temPetVar = document.querySelector('input[name="temPet"]:checked').value === 'sim' ? 1 : 0;

                    var nomePetVar = (temPetVar == 1) ? nome_pet_input.value : null;
                    var idadePetVar = (temPetVar == 1) ? idade_pet_input.value : null;
                    var pesoPetVar = (temPetVar == 1) ? peso_pet_input.value : null;
                    var diasVar = (temPetVar == 1) ? tempo_pet_input.value : null;

                    if (nomeVar == "" || emailVar == "" || senhaVar == "") {
                        alert("Campos obrigatórios vazios!");
                        return;
                    }


                    // Validação parte
                    // Se tiver pet, validamos os campos antes de enviar
                    if (temPetVar == 1) {
                        var nomePetVar = nome_pet_input.value;
                        var idadePetVar = idade_pet_input.value;
                        var pesoPetVar = peso_pet_input.value.replace(',', '.'); // Garante o ponto decimal
                        var diasVar = tempo_pet_input.value;

                        // VALIDAÇÃO: Se algum campo estiver vazio ou for inválido
                        if (nomePetVar == "" || idadePetVar == "" || pesoPetVar == "" || diasVar == "") {
                            alert("Por favor, preencha todos os campos do seu pet para continuar!");
                            return false; // Interrompe a função e não faz o fetch
                        }

                        if (Number(pesoPetVar) <= 0 || Number(idadePetVar) < 0) {
                            alert("Por favor, insira valores válidos para peso e idade!");
                            return false;
                        }
                    }

                    // Enviando para o servidor via Fetch
                    fetch("/usuarios/cadastrar", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            nomeServer: nomeVar,
                            emailServer: emailVar,
                            senhaServer: senhaVar,
                            telefoneServer: telefoneVar,
                            temPetServer: temPetVar,
                            // Dados do pet (opcional para o servidor tratar depois)
                            nomePetServer: nomePetVar,
                            idadePetServer: idadePetVar,
                            pesoPetServer: pesoPetVar, // <-- Verifique se este nome está igual ao do Controller
                            diasServer: diasVar
                        }),
                    })
                        .then(function (resposta) {
                            if (resposta.ok) {
                                alert("Cadastro realizado com sucesso! Redirecionando para o login...");
                                setTimeout(() => {
                                    window.location = "login.html";
                                }, 1000);
                            } else {
                                throw "Houve um erro ao tentar realizar o cadastro!";
                            }
                        })
                        .catch(function (resposta) {
                            console.log(`#ERRO: ${resposta}`);
                        });

                    return false;
                }

                function voltarEtapa() {
                    document.getElementById('etapa_usuario').style.display = 'block';
                    document.getElementById('etapa_pet').style.display = 'none';
                    document.getElementById('btn_acao').innerHTML = "Próximo ->";
                    document.getElementById('btn_voltar').style.display = "none";
                    document.getElementById('link_login').style.display = 'block';
                }
            </script>
</body>
</html>
