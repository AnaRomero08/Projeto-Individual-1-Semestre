<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Blog Cat's</title>
    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="body-login">
        <div class="container-login">
            <div class="card-login">
                <div class="logo-auth">
                    <img src="./assets/imgs/logo_sem_fundo.png" alt="Logo">
                </div>
                <h2>Entre com sua conta!</h2>

                <div class="formulario">
                    <div class="campo">
                        <span>Email:</span>
                        <input type="email" id="ipt_email" placeholder="email@email.com">
                    </div>

                    <div class="campo">
                        <span>Senha:</span>

                        <input type="password" id="ipt_senha" placeholder="************">
                    </div>

                </div>
                <button class="btn-login" onclick="entrar()">
                    Entrar
                </button>
                <div id="mensagem"></div>

            </div>

        </div>

    </div>

</body>

</html>

<script>

    function entrar() {

        let email = ipt_email.value;
        let senha = ipt_senha.value;

        mensagem.innerHTML = "";

        /* VERIFICAR CAMPOS VAZIOS */

        if (email == "" || senha == "") {

            mensagem.innerHTML = `
                <span style="color:red;">
                    Preencha todos os campos!
                </span>
            `;

        }

        /* VALIDAR EMAIL */

        else if (!email.includes("@") || !email.includes(".")) {

            mensagem.innerHTML = `
                <span style="color:red;">
                    Digite um email válido!
                </span>
            `;

        }

        /* VALIDAR SENHA */

        else if (senha.length < 6) {

            mensagem.innerHTML = `
                <span style="color:red;">
                    A senha deve ter pelo menos 6 caracteres!
                </span>
            `;

        }

        /* LOGIN CORRETO */

        else {

            mensagem.innerHTML = `
                <span style="color:green;">
                    Login realizado com sucesso!
                </span>
            `;

        }

    }

</script>
